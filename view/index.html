<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo 依赖图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100vh; overflow: hidden; }

    #graphUI {
      display: flex; height: 100vh;
      flex-direction: column; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #333;
    }

    body.dark #graphUI { color: #cccccc; }

    .toolbar {
      padding: 10px 16px; background: #fff; border-bottom: 1px solid #e8e8e8;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .dark .toolbar { background: #252526; border-bottom-color: #3c3c3c; }
    .toolbar-title { font-size: 14px; font-weight: 600; flex: 1; }

    .btn {
      padding: 6px 16px; border: none; border-radius: 6px;
      font-size: 12px; cursor: pointer; transition: background 0.15s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-ghost { background: transparent; color: #666; }
    .btn-ghost:hover { background: #f0f0f0; }
    .dark .btn-ghost { color: #9d9d9d; }
    .dark .btn-ghost:hover { background: #3c3c3c; }

    .warning {
      background: #fffbe6; border-bottom: 1px solid #ffe58f; color: #ad6800;
      padding: 6px 16px; font-size: 12px; flex-shrink: 0;
    }
    .dark .warning { background: #3a3000; border-bottom-color: #554400; color: #ffc53d; }

    #graphArea { flex: 1; overflow: auto; position: relative; background: #f7f8fa; }
    .dark #graphArea { background: #1e1e1e; }
    #graphContainer { min-width: 100%; min-height: 100%; display: flex; align-items: center; justify-content: center; }
    #graphInner { position: relative; flex-shrink: 0; }

    .node {
      position: absolute; width: 200px; background: #fff;
      border: 2px solid #d9d9d9; border-radius: 10px;
      padding: 10px 12px; cursor: default;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s, transform 0.15s;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .node:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-1px); }
    .dark .node { background: #2d2d2d; border-color: #3c3c3c; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .node.done { opacity: 0.55; }
    .node.done .node-content { text-decoration: line-through; color: #999; }
    .node.not-found { border-style: dashed; opacity: 0.65; }

    .node-check {
      width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid #d9d9d9; background: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; margin-top: 1px;
    }
    .node-check:hover { border-color: #52c41a; background: #f6ffed; }
    .node-check:active { transform: scale(0.9); }
    .node-check.checked { border-color: #52c41a; background: #52c41a; }
    .node-check.checked::after {
      content: ''; display: block; width: 4px; height: 7px;
      border: solid #fff; border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg) translate(-0.5px, -0.5px);
    }
    .dark .node-check { border-color: #555; background: #2d2d2d; }
    .dark .node-check:hover { border-color: #73d13d; background: #1e3a1e; }
    .dark .node-check.checked { border-color: #73d13d; background: #73d13d; }
    .dark .node-check.checked::after { border-color: #2d2d2d; }

    .node-body { flex: 1; min-width: 0; position: relative; }

    .node-focus {
      position: absolute; top: -2px; right: -4px;
      width: 16px; height: 16px; cursor: pointer;
      border: none; background: none; padding: 0;
      color: #bbb; transition: color 0.15s;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.15s, color 0.15s;
    }
    .node:hover .node-focus { opacity: 1; }
    .node-focus.active { opacity: 1; color: #1890ff; }
    .node-focus:hover { color: #1890ff; }
    .dark .node-focus { color: #555; }
    .dark .node-focus:hover { color: #40a9ff; }
    .dark .node-focus.active { color: #40a9ff; }

    .node-content {
      font-size: 12px; line-height: 1.5; word-break: break-word;
      display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .node-badge {
      display: inline-block; font-size: 10px; padding: 1px 6px;
      border-radius: 10px; margin-top: 5px;
    }
    .badge-pending  { background: #fff7e6; color: #d46b08; }
    .badge-done     { background: #f6ffed; color: #389e0d; }
    .badge-blocked  { background: #fff1f0; color: #cf1322; }
    .badge-focus    { background: #e6f7ff; color: #096dd9; }
    .dark .badge-pending  { background: #3a3000; color: #ffc53d; }
    .dark .badge-done     { background: #1e3a1e; color: #73d13d; }
    .dark .badge-blocked  { background: #3a1a1a; color: #ff4d4f; }
    .dark .badge-focus    { background: #111d2c; color: #40a9ff; }

    .node.blocked { border-style: dashed; opacity: 0.7; }
    .dark .node.blocked { opacity: 0.7; }

    .level-default   { border-color: #1890ff; }
    .level-secondary { border-color: #bbb; }
    .level-success   { border-color: #52c41a; }
    .level-warning   { border-color: #faad14; }
    .level-danger    { border-color: #ff4d4f; }

    #edgeSvg { position: absolute; top: 0; left: 0; pointer-events: none; }

    #graphInner { transition: opacity 0.35s ease; }
    #graphInner.fade-out { opacity: 0; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: absolute; inset: 0;
      color: #aaa; padding: 40px 24px; text-align: center; user-select: none;
      opacity: 0; pointer-events: none; transition: opacity 0.35s ease;
    }
    .empty-state.visible { opacity: 1; pointer-events: auto; }
    .empty-icon { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.35; }
    .empty-title { font-size: 15px; font-weight: 500; margin-bottom: 10px; color: #888; }
    .dark .empty-title { color: #777; }
    .empty-hint { font-size: 12px; line-height: 2; color: #aaa; }
  </style>
</head>

<body>
  <div id="graphUI">
    <div class="toolbar">
      <span class="toolbar-title" data-i18n="title"></span>
      <button class="btn btn-ghost" id="refreshBtn" data-i18n="refresh"></button>
    </div>
    <div id="warnings"></div>
    <div id="graphArea">
      <div id="graphContainer"></div>
      <div class="empty-state visible" id="emptyState">
        <svg class="empty-icon" viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="8" y="10" width="24" height="16" rx="4"/>
          <rect x="48" y="10" width="24" height="16" rx="4"/>
          <rect x="28" y="50" width="24" height="16" rx="4"/>
          <line x1="26" y1="26" x2="36" y2="50" stroke-dasharray="3,2"/>
          <line x1="54" y1="26" x2="44" y2="50" stroke-dasharray="3,2"/>
          <polygon points="36,50 33,45 39,45" fill="currentColor" stroke="none"/>
          <polygon points="44,50 41,45 47,45" fill="currentColor" stroke="none"/>
        </svg>
        <div class="empty-title" data-i18n="emptyTitle"></div>
        <div class="empty-hint" data-i18n="emptyHint"></div>
      </div>
    </div>
  </div>

  <script>
    // ── i18n ──
    const I18N = {
      zh: {
        title: '依赖图谱', refresh: '刷新',
        emptyTitle: '暂无依赖关系',
        emptyHint: '右键 Todo 节点，选择「设置依赖」<br>即可建立待办之间的依赖关系',
        allDoneTitle: '所有依赖任务已完成 🎉',
        allDoneHint: '当前依赖链路中的任务均已完成<br>如有新的依赖关系，请重新创建',
        done: '已完成', pending: '待完成', blocked: '阻塞中', focus: '进行中', unfocus: '取消进行', notFound: '未找到该 Todo',
        cycleWarning: '检测到循环依赖，部分节点的层级可能不准确',
      },
      en: {
        title: 'Dependency Graph', refresh: 'Refresh',
        emptyTitle: 'No dependencies yet',
        emptyHint: 'Right-click a Todo and select "Set Dependencies"<br>to create dependency relationships',
        allDoneTitle: 'All dependency tasks completed 🎉',
        allDoneHint: 'All tasks in dependency chains are done<br>Create new dependencies if needed',
        done: 'Done', pending: 'Pending', blocked: 'Blocked', focus: 'In Progress', unfocus: 'Cancel Focus', notFound: 'Todo not found',
        cycleWarning: 'Cycle detected — some nodes may be positioned incorrectly',
      },
    }
    let t = I18N.zh
    function detectLang(raw) {
      t = (raw || navigator.language || 'en').toLowerCase().startsWith('zh') ? I18N.zh : I18N.en
    }
    function applyI18n() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const v = t[el.dataset.i18n]; if (v) el.innerHTML = v
      })
    }

    // ── Plugin communication ──
    let callId = 0
    const pendingCalls = {}
    let currentFilePath = ''
    let isDark = false

    function callPlugin(method, params) {
      return new Promise((resolve, reject) => {
        const id = ++callId
        const timer = setTimeout(() => { delete pendingCalls[id]; reject(new Error('timeout')) }, 5000)
        pendingCalls[id] = {
          resolve: v => { clearTimeout(timer); resolve(v) },
          reject:  e => { clearTimeout(timer); reject(e) },
        }
        window.parent.postMessage({ type: 'plugin-call', id, method, params }, '*')
      })
    }

    function unwrap(res) {
      const inner = res?.result || res
      return inner?.result !== undefined ? inner.result : inner
    }

    window.addEventListener('message', event => {
      const msg = event.data
      if (!msg) return

      if (msg.type === 'plugin-init') {
        currentFilePath = msg.filePath || ''
        detectLang(msg.lang); applyI18n()
        if (msg.theme) {
          document.body.style.color = msg.theme.color
          document.body.style.backgroundColor = msg.theme.backgroundColor
          const bg = msg.theme.backgroundColor
          isDark = typeof bg === 'string' && (
            bg.includes('rgb')
              ? parseInt(bg.split(',')[0].replace(/\D/g, '')) < 128
              : bg.startsWith('#') && parseInt(bg.slice(1, 3), 16) < 128
          )
          if (isDark) document.body.classList.add('dark')
        }
        autoScan()
      }

      if (msg.type === 'plugin-result' && pendingCalls[msg.id]) {
        const { resolve, reject } = pendingCalls[msg.id]
        delete pendingCalls[msg.id]
        msg.error ? reject(new Error(msg.error)) : resolve(msg.result)
      }

      if (msg.type === 'plugin-tree-update') {
        autoScan()
      }
    })

    // ── Graph ──
    document.getElementById('refreshBtn').addEventListener('click', autoScan)

    async function autoScan() {
      if (!currentFilePath) return
      document.getElementById('warnings').innerHTML = ''
      let data
      try {
        const res = await callPlugin('scanAllDeps', { filePath: currentFilePath })
        data = unwrap(res)
      } catch { return }
      if (!data) return

      const { todos, edges: allEdges } = data
      hideEmpty()

      // Build adjacency (both directions) to find connected components
      const allIds = new Set()
      const neighbors = {}
      for (const [from, to] of allEdges) {
        allIds.add(from); allIds.add(to)
        if (!neighbors[from]) neighbors[from] = []
        if (!neighbors[to]) neighbors[to] = []
        neighbors[from].push(to)
        neighbors[to].push(from)
      }
      // BFS to find connected components, keep components that have any undone node
      const visited = new Set()
      const visibleIds = new Set()
      for (const start of allIds) {
        if (visited.has(start)) continue
        const comp = []
        const queue = [start]
        visited.add(start)
        while (queue.length) {
          const cur = queue.shift()
          comp.push(cur)
          for (const nb of (neighbors[cur] || [])) {
            if (!visited.has(nb)) { visited.add(nb); queue.push(nb) }
          }
        }
        if (comp.some(id => !todos[id]?.done)) {
          for (const id of comp) visibleIds.add(id)
        }
      }
      const edges = allEdges.filter(([from, to]) => visibleIds.has(from) && visibleIds.has(to))
      const nodeIds = [...visibleIds]
      if (!nodeIds.length) { fadeToEmpty(allEdges.length > 0); return }

      const { layers, hasCycle } = assignLayers(nodeIds, edges)
      if (hasCycle) {
        document.getElementById('warnings').innerHTML = '<div class="warning">' + t.cycleWarning + '</div>'
      }
      const layout = layoutGraph(nodeIds, layers)
      renderGraph(nodeIds, edges, layout.positions, todos, layout)
    }

    function showEmpty(allDone) {
      document.getElementById('graphContainer').innerHTML = ''
      const e = document.getElementById('emptyState')
      e.querySelector('.empty-title').innerHTML = allDone ? t.allDoneTitle : t.emptyTitle
      e.querySelector('.empty-hint').innerHTML = allDone ? t.allDoneHint : t.emptyHint
      e.classList.add('visible')
    }

    function hideEmpty() {
      document.getElementById('emptyState').classList.remove('visible')
    }

    function fadeToEmpty(allDone) {
      const inner = document.getElementById('graphInner')
      if (!inner) { showEmpty(allDone); return }
      inner.classList.add('fade-out')
      inner.addEventListener('transitionend', () => showEmpty(allDone), { once: true })
    }

    // ── Layout algorithm ──
    function assignLayers(nodeIds, edges) {
      const adj = {}, inDeg = {}
      for (const id of nodeIds) { adj[id] = []; inDeg[id] = 0 }
      for (const [f, tt] of edges) {
        if (adj[f] && inDeg[tt] !== undefined) { adj[f].push(tt); inDeg[tt]++ }
      }
      const layers = {}, queue = []
      for (const id of nodeIds) { if (inDeg[id] === 0) { queue.push(id); layers[id] = 0 } }
      let head = 0
      while (head < queue.length) {
        const cur = queue[head++]
        for (const next of adj[cur]) {
          const nl = layers[cur] + 1
          if (layers[next] === undefined || nl > layers[next]) layers[next] = nl
          if (--inDeg[next] === 0) queue.push(next)
        }
      }
      const hasCycle = nodeIds.some(id => layers[id] === undefined)
      if (hasCycle) {
        const maxL = Math.max(0, ...Object.values(layers).filter(v => v !== undefined))
        for (const id of nodeIds) { if (layers[id] === undefined) layers[id] = maxL + 1 }
      }
      return { layers, hasCycle }
    }

    const NODE_W = 200, NODE_H = 72, GAP_X = 44, GAP_Y = 70, PAD = 36
    function layoutGraph(nodeIds, layers) {
      if (!nodeIds.length) return { positions: {}, width: 0, height: 0 }
      const maxLayer = Math.max(...Object.values(layers))
      const groups = Array.from({ length: maxLayer + 1 }, () => [])
      for (const id of nodeIds) groups[layers[id]].push(id)
      const maxCount = Math.max(...groups.map(g => g.length))
      const totalW = Math.max(maxCount * NODE_W + (maxCount - 1) * GAP_X + PAD * 2, 400)
      const totalH = PAD * 2 + (maxLayer + 1) * NODE_H + maxLayer * GAP_Y
      const positions = {}
      for (let l = 0; l <= maxLayer; l++) {
        const g = groups[l]
        const gw = g.length * NODE_W + (g.length - 1) * GAP_X
        const sx = (totalW - gw) / 2
        for (let i = 0; i < g.length; i++) {
          positions[g[i]] = { x: sx + i * (NODE_W + GAP_X), y: PAD + l * (NODE_H + GAP_Y) }
        }
      }
      return { positions, width: totalW, height: totalH }
    }

    function svgEl(tag, attrs) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag)
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v)
      return el
    }

    async function toggleTodoDone(todoId, done) {
      try {
        await callPlugin('toggleDone', { todoId, done, filePath: currentFilePath })
      } catch {}
      autoScan()
    }

    async function toggleTodoFocus(todoId, focus) {
      try {
        await callPlugin('toggleFocus', { todoId, focus, filePath: currentFilePath })
      } catch {}
      autoScan()
    }

    function renderGraph(nodeIds, edges, positions, todoData, layout) {
      const container = document.getElementById('graphContainer')
      container.innerHTML = ''
      const inner = document.createElement('div')
      inner.id = 'graphInner'
      inner.style.width  = layout.width + 'px'
      inner.style.height = layout.height + 'px'
      container.appendChild(inner)

      // Build dependency map: nodeId -> [depIds]
      const depsOf = {}
      for (const [from, to] of edges) {
        if (!depsOf[to]) depsOf[to] = []
        depsOf[to].push(from)
      }

      function isBlocked(id) {
        const deps = depsOf[id]
        if (!deps?.length) return false
        const todo = todoData[id]
        if (todo?.done) return false
        return deps.some(depId => {
          const dep = todoData[depId]
          return !dep || !dep.done
        })
      }

      const edgeColor = isDark ? '#555' : '#c8c8d0'
      const blockedEdgeColor = isDark ? '#5c2020' : '#ffccc7'
      const arrowColor = isDark ? '#777' : '#aaa'
      const blockedArrowColor = isDark ? '#ff4d4f' : '#ff7875'
      const svg = svgEl('svg', { id: 'edgeSvg', width: layout.width, height: layout.height })
      const defs = svgEl('defs', {})
      function addMarker(id, color) {
        const m = svgEl('marker', {
          id, markerWidth: 8, markerHeight: 6,
          refX: 4, refY: 3, orient: 'auto-start-reverse', markerUnits: 'userSpaceOnUse',
        })
        m.appendChild(svgEl('polygon', { points: '0 0,8 3,0 6', fill: color }))
        defs.appendChild(m)
      }
      addMarker('arrow', arrowColor)
      addMarker('arrow-blocked', blockedArrowColor)
      svg.appendChild(defs)

      const ARROW_H = 6
      for (const [from, to] of edges) {
        const p1 = positions[from], p2 = positions[to]
        if (!p1 || !p2) continue
        const x1 = p1.x + NODE_W / 2, y1 = p1.y + NODE_H
        const x2 = p2.x + NODE_W / 2, y2 = p2.y - ARROW_H
        const dy = Math.abs(y2 - y1)
        const cp = Math.max(dy * 0.4, 30)
        const fromDone = todoData[from]?.done
        const toBlocked = isBlocked(to)
        const isBlockingEdge = toBlocked && !fromDone
        svg.appendChild(svgEl('path', {
          d: `M${x1},${y1} C${x1},${y1 + cp} ${x2},${y2 - cp} ${x2},${y2}`,
          fill: 'none',
          stroke: isBlockingEdge ? blockedEdgeColor : edgeColor,
          'stroke-width': 1.5,
          'stroke-dasharray': isBlockingEdge ? '6,3' : 'none',
          'marker-end': isBlockingEdge ? 'url(#arrow-blocked)' : 'url(#arrow)',
        }))
      }
      inner.appendChild(svg)

      for (const id of nodeIds) {
        const pos = positions[id]; if (!pos) continue
        const todo = todoData[id]
        const blocked = isBlocked(id)
        const el = document.createElement('div'); el.className = 'node'
        if (todo) {
          el.classList.add('level-' + (todo.level || 'default'))
          if (todo.done) el.classList.add('done')
          else if (blocked) el.classList.add('blocked')
        } else el.classList.add('not-found')
        el.style.cssText = `left:${pos.x}px;top:${pos.y}px;width:${NODE_W}px;`

        if (todo) {
          const check = document.createElement('div')
          check.className = 'node-check' + (todo.done ? ' checked' : '')
          check.addEventListener('click', e => {
            e.stopPropagation()
            toggleTodoDone(id, !todo.done)
          })
          el.appendChild(check)
        }

        const body = document.createElement('div'); body.className = 'node-body'

        if (todo && !todo.done && !blocked) {
          const focusBtn = document.createElement('button')
          focusBtn.className = 'node-focus' + (todo.focus ? ' active' : '')
          focusBtn.title = todo.focus ? t.unfocus : t.focus
          focusBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>'
          focusBtn.addEventListener('click', e => {
            e.stopPropagation()
            toggleTodoFocus(id, !todo.focus)
          })
          body.appendChild(focusBtn)
        }
        const content = document.createElement('div'); content.className = 'node-content'
        if (todo) {
          content.textContent = todo.content
        } else {
          content.textContent = t.notFound
          content.style.color = '#ff4d4f'; content.style.fontStyle = 'italic'
        }
        body.appendChild(content)

        if (todo) {
          const sb = document.createElement('span')
          if (todo.done) {
            sb.className = 'node-badge badge-done'
            sb.textContent = t.done
          } else if (blocked) {
            sb.className = 'node-badge badge-blocked'
            sb.textContent = t.blocked
          } else if (todo.focus) {
            sb.className = 'node-badge badge-focus'
            sb.textContent = t.focus
          } else {
            sb.className = 'node-badge badge-pending'
            sb.textContent = t.pending
          }
          body.appendChild(sb)
        }

        el.appendChild(body); inner.appendChild(el)
      }
    }

    // ── Init ──
    detectLang(); applyI18n()
  </script>
</body>

</html>
